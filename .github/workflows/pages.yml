name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Doxygen (MCU) ──────────────────────────────────────────────
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz wget
          wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
          tar xzf doxygen-1.16.1.linux.bin.tar.gz
          sudo cp doxygen-1.16.1/bin/doxygen /usr/local/bin/

      - name: Build MCU Doxygen docs
        working-directory: mcu
        run: doxygen Doxyfile

      # ── Sphinx (SBC) ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Sphinx dependencies
        run: pip install -r sbc/docs/requirements.txt

      - name: Install Graphviz for Sphinx
        run: sudo apt-get install -y graphviz

      - name: Build SBC Sphinx docs
        run: make -C sbc/docs html

      # ── Assemble site ──────────────────────────────────────────────
      - name: Assemble site output
        run: |
          mkdir -p _site
          cp -r docs_site/* _site/
          cp -r mcu/docs/html _site/mcu
          cp -r sbc/docs/build/html _site/sbc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
