##### icu.conf — user-friendly-tunable ICU parameters
##
##### Edit these values to adjust system behavior without rummaging in source code directly.
##
##### DO NOT DELETE THIS FILE OR ES KANN DEINE DING KAPUTTMACHEN!, WIE SCHADE!!!
 
# todo: Remember modifying this in RPi too (modules/hardware/camera.py)

[hardware]
# UART communication speed to the MCU (in bps -- bits per second).
# Must match the baud rate configured on the PIC18F67J94 side.
uart_mcu_speed = 115200
# SPI clock speed for flash memory writes (in MHz -- 1,000,000 Hz).
# Higher values = faster writes but may cause errors on long/noisy wiring.
data_write_speed = 10

[logging]
# Maximum size of each log file (in MiB -- 1,024*1,024 B) before it gets rotated.
max_log_size = 5
# Number of old rotated log files to keep. Oldest are deleted first.
# Total worst-case disk usage = max_log_size * (backup_count + 1).
backup_count = 3

[camera]
# Resolution of images saved to flash (in pixels).
# Must be supported by the camera sensor. Larger = better quality but bigger files.
capture_width = 1280
capture_height = 960
# JPEG compression quality for images saved to flash (1-100).
# 100 = best quality / largest file, lower values save flash space.
image_quality = 100

[orchestrator]
# Main loop idle sleep (in ms -- milliseconds [10^-3]).
# Lower = faster command response but higher CPU usage and heat.
# Higher = saves power but adds latency to UART command handling.
loop_interval = 10

[benchmarks]
# Set to true to launch the hardware sampler alongside the main application.
# Logs raw CPU, RAM, and temperature to a CSV file for offline analysis.
# Disable for production — this is a development/testing tool.
hardware_sampling = false
# Sampling interval in seconds. Lower = more resolution but more disk writes.
sampling_interval = 1

[watchdog]
# Interval in seconds between watchdog pings to systemd.
# If the app fails to ping within ~3x this value, systemd will restart it.
watchdog_interval = 10
